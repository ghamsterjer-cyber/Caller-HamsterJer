<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>HJWebRTC Звонилка (нативный клиент)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #111827;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --border: #1f2937;
            --input-bg: #020617;
        }

        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 24px 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid var(--border);
            padding: 20px 18px 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 18px;
        }

        .field-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .input {
            flex: 1;
            background: var(--input-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        .input::placeholder {
            color: #4b5563;
        }

        .icon-button {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #020617;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }

        .icon-button:active {
            transform: scale(0.96);
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin: 8px 0 16px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--accent-green);
        }

        .status-dot.error {
            background: var(--accent-red);
        }

        .status-dot.wait {
            background: var(--accent-blue);
        }

        .status-text-main {
            color: var(--text-main);
        }

        .buttons-row {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .btn {
            flex: 1;
            border-radius: 999px;
            padding: 10px 0;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-red {
            background: var(--accent-red);
            color: white;
        }

        .btn-blue {
            background: var(--accent-blue);
            color: white;
        }

        .btn span.emoji {
            font-size: 16px;
        }

        .footer-hint {
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <div class="title">HJWebRTC Звонилка</div>
        <div class="subtitle">P2P‑звонки через интернет</div>

        <div class="field-label">Ключ комнаты</div>
        <div class="input-row">
            <input
                id="roomIdInput"
                class="input"
                type="text"
                inputmode="numeric"
                placeholder="Напр. 1234"
            />
            <button class="icon-button" onclick="onRandomRoomId()">
                🔄
            </button>
        </div>

        <div class="status-row">
            <div id="statusDot" class="status-dot"></div>
            <div>
                <div id="statusMain" class="status-text-main">Готов к работе</div>
                <div id="statusSub" class="status-sub">
                    Создайте комнату или присоединитесь к существующей.
                </div>
            </div>
        </div>

        <div class="buttons-row">
            <button class="btn btn-red" onclick="onCreateRoom()">
                <span class="emoji">🔴</span>
                <span>Создать комнату</span>
            </button>
            <button class="btn btn-blue" onclick="onJoinRoom()">
                <span class="emoji">🔵</span>
                <span>Присоединиться</span>
            </button>
        </div>
		<div class="buttons-row" style="margin-top: 20px;">
			<button id="hangupButton" class="btn btn-red" onclick="onHangupCall()" style="display:none;">
				<span class="emoji">⛔</span>
				<span>Завершить звонок</span>
			</button>
		</div>

    </div>
</div>

<script>
    // =========================
    // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ UI
    // =========================

    function setStatus(main, sub, mode) {
        const dot = document.getElementById('statusDot');
        const mainEl = document.getElementById('statusMain');
        const subEl = document.getElementById('statusSub');

        mainEl.textContent = main || '';
        subEl.textContent = sub || '';

        dot.classList.remove('error', 'wait');
        if (mode === 'error') {
            dot.classList.add('error');
        } else if (mode === 'wait') {
            dot.classList.add('wait');
        }
    }

    function getRoomId() {
        const input = document.getElementById('roomIdInput');
        return (input.value || '').trim();
    }

    function onRandomRoomId() {
        const input = document.getElementById('roomIdInput');
        const randomId = Math.floor(1000 + Math.random() * 9000).toString();
        input.value = randomId;
        setStatus('Случайный ключ сгенерирован', 'Теперь можно создать комнату или присоединиться.', 'wait');
    }

    // =========================
    // ВЗАИМОДЕЙСТВИЕ С ANDROID
    // =========================
    // ВАЖНО:
    //  - НИКАКОГО WebRTC / getUserMedia / MediaRecorder здесь нет.
    //  - Эта страница только сообщает Android, что делать.
    //  - Весь Firebase и WebRTC — в Kotlin.

    function onCreateRoom() {
        const roomId = getRoomId();
        if (!roomId) {
            setStatus('Не указан ключ комнаты', 'Введите ключ комнаты, например 1234.', 'error');
            return;
        }

        setStatus('Создание комнаты…', 'Ожидаем ответ от приложения.', 'wait');

        if (window.Android && typeof Android.startOutgoingCall === 'function') {
            Android.startOutgoingCall(roomId);
        } else {
            console.warn('Android.startOutgoingCall не доступен');
            setStatus('Android‑мост недоступен', 'Проверьте, что страница открыта в приложении.', 'error');
        }
    }

    function onJoinRoom() {
        const roomId = getRoomId();
        if (!roomId) {
            setStatus('Не указан ключ комнаты', 'Введите ключ комнаты, который вам сообщили.', 'error');
            return;
        }

        setStatus('Подключение к комнате…', 'Ожидаем ответ от приложения.', 'wait');

        if (window.Android && typeof Android.joinCall === 'function') {
            Android.joinCall(roomId);
        } else {
            console.warn('Android.joinCall не доступен');
            setStatus('Android‑мост недоступен', 'Проверьте, что страница открыта в приложении.', 'error');
        }
    }
	
	function onHangupCall() {
		if (window.Android && typeof Android.hangupCall === 'function') {
			Android.hangupCall();
			setStatus('Завершение звонка…', 'Ожидаем завершения.', 'wait');
		} else {
			setStatus('Android‑мост недоступен', 'Проверьте приложение.', 'error');
		}
	}


    // =========================
    // ОБРАТНЫЕ ВЫЗОВЫ ИЗ ANDROID
    // =========================
    // Эти функции будет вызывать нативный код через:
    // webView.evaluateJavascript("onCallStateChanged('connected')", null)

    function onCallStateChanged(state) {
        switch (state) {
            case 'connecting':
                setStatus('Соединение…', 'Устанавливаем P2P‑соединение.', 'wait');
                break;
            case 'ringing':
                setStatus('Вызов…', 'Ожидаем ответ абонента.', 'wait');
                break;
            case 'connected':
				document.getElementById("hangupButton").style.display = "flex";
                setStatus('Соединение установлено', 'Идёт разговор.', 'wait');
                break;
            case 'ended':
                setStatus('Звонок завершён', 'Вы можете начать новый звонок.', null);
                break;
            case 'failed':
                setStatus('Ошибка звонка', 'Проверьте интернет или попробуйте другой ключ комнаты.', 'error');
                break;
            default:
				document.getElementById("hangupButton").style.display = "none";
                setStatus('Готов к работе', 'Создайте комнату или присоединитесь к существующей.', null);
				break;
        }
    }

    function onError(message) {
        setStatus('Ошибка', message || 'Произошла неизвестная ошибка.', 'error');
    }
</script>
</body>
</html>
